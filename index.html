<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00b894">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUKU Token Pay</title>
    <style>
    :root {
    --glass-bg: rgba(255, 255, 255, 0.1);
    --glass-border: rgba(255, 255, 255, 0.2);
    --text-main: #ffffff;
    --accent-color: #00d2ff; /* A modern blue accent */
    --font-main: 'Segoe UI', Roboto, Helvetica, sans-serif;
}

body {
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                url('https://images.unsplash.com/photo-1473341304170-971dccb5ac1e');
    background-size: cover;
    background-attachment: fixed;
    font-family: var(--font-main);
    color: var(--text-main);
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

/* Header with that specific Vodacom gradient/look */
.glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 25px;
    width: 90%;
    max-width: 400px;
    margin-top: 20px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
}

.balance-amount {
    font-size: 2.5rem;
    font-weight: bold;
    color: var(--accent-color);
}

/* Float the card higher */
.account-card {
    background: white;
    width: 92%;
    margin: -50px auto 25px;
    padding: 25px 15px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    text-align: center;
}

.account-card h3 { color: #888; font-size: 13px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
.account-card h1 { font-size: 32px; margin: 0; color: #1a1a1a; font-weight: 700; }

/* Input styling to look like the M-Pesa 'Fields' */
.input-group {
    background: white;
    width: 92%;
    margin: 0 auto 15px;
    padding: 12px 20px;
    border-radius: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    box-sizing: border-box;
}

.input-group label {
    font-size: 11px;
    color: var(--mpesa-red);
    font-weight: 700;
    display: block;
    margin-bottom: 2px;
}

input {
    width: 100%;
    border: none;
    font-size: 18px;
    font-weight: 500;
    outline: none;
    background: transparent;
    padding: 5px 0;
}

/* The Big Red Button */
.glass-button {
    background: #e60000; /* Keeping a touch of that M-Pesa red for the action */
    color: white;
    border: none;
    padding: 15px;
    width: 100%;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.3s;
}

.glass-button:hover {
    background: #ff3333;
    transform: scale(1.02);
}
    </style>
</head>
<body>
    <div class="header-greeting">
    Habari, Muslimu 👋
</div>

<div class="glass-card">
    <div class="balance-section">
        <p>LUKU BALANCE</p>
        <div class="balance-amount">14.20 <span style="font-size: 1.2rem;">kWh</span></div>
        <p class="meter-status">● Meter Active: 1420 5678 112</p>
    </div>

    <hr style="border: 0.5px solid var(--glass-border); margin: 20px 0;">

    <div class="input-group">
        <label>METER NUMBER</label>
        <input type="number" placeholder="1420 5678 112">
    </div>

    <div class="input-group">
        <label>AMOUNT (TSH)</label>
        <input type="number" placeholder="Min 1,000" oninput="calculateUnits()">
    </div>

    <button class="glass-button" onclick="pay()">Nunua Kifurushi</button>
</div>
    <div style="position:fixed; bottom:0; width:100%; height:70px; background:white; display:flex; justify-content:space-around; align-items:center; border-top: 1px solid #eee;">
        <div style="color:var(--mpesa-red); text-align:center; font-size:11px;">🏠<br>Home</div>
        <div style="color:#888; text-align:center; font-size:11px;">📊<br>Usage</div>
        <div style="color:#888; text-align:center; font-size:11px;">👤<br>Account</div>
    </div>
<script>
    // 1. The Dictionary
    const translations = {
        en: {
            greeting: "Hello, name 👋",
            balance_label: "LUKU BALANCE",
            meter_label: "METER NUMBER",
            amount_label: "AMOUNT (TSH)",
            pay_btn: "Buy Units",
            active_meter: "● Meter Active: ",
            home: "Home",
            usage: "Usage",
            account: "Account"
        },
        sw: {
            greeting: "Habari, Muslimu 👋",
            balance_label: "SALIO LA LUKU",
            meter_label: "NAMBA YA MITA",
            amount_label: "KIASI (TSH)",
            pay_btn: "Nunua Kifurushi",
            active_meter: "● Mita Ipo Hewani: ",
            home: "Nyumbani",
            usage: "Matumizi",
            account: "Akaunti"
        }
    };

    let currentLang = 'sw';

    // 2. The Switcher Function
    function toggleLanguage() {
        currentLang = (currentLang === 'sw') ? 'en' : 'sw';
        
        // Update the toggle button text
        document.getElementById('lang-label').innerText = (currentLang === 'sw') ? 'EN' : 'SW';

        // Update all text elements
        document.getElementById('text-greeting').innerText = translations[currentLang].greeting;
        document.getElementById('balance-title').innerText = translations[currentLang].balance_label;
        document.getElementById('meter-label').innerText = translations[currentLang].meter_label;
        document.getElementById('amount-label').innerText = translations[currentLang].amount_label;
        document.getElementById('pay-btn-text').innerText = translations[currentLang].pay_btn;
        
        // Update Bottom Nav
        const navItems = document.querySelectorAll('.nav-text');
        navItems[0].innerText = translations[currentLang].home;
        navItems[1].innerText = translations[currentLang].usage;
        navItems[2].innerText = translations[currentLang].account;
    }
async function pay() {
    // Get the values the user typed in
    const meterId = document.getElementById('meter').value;
    const amount = document.getElementById('amount').value;

    // Basic check to make sure fields aren't empty
    if (!meterId || !amount) {
        alert("Tafadhali jaza mita na kiasi!");
        return;
    }

    try {
        // Send the data to your Python backend (flow.py)
        const response = await fetch('/pay', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ meter_id: meterId, amount: amount })
        });
        
        const data = await response.json();
        
        if (data.status === "success") {
            alert("Token imetumwa: " + data.token);
        }
    } catch (error) {
        console.error("Error:", error);
        alert("Imeshindwa kutuma! Hakikisha Python (flow.py) inakimbia.");
    }
}
function calculateUnits() {
    const amount = document.getElementById('amount').value;
    const unitsBox = document.getElementById('units-box');
    const unitsDisplay = document.getElementById('predicted-units');
    
    if (amount >= 1000) {
        unitsBox.style.display = 'block';
        // Logic: Tanzanian residential rate is ~350 TSH per unit
        const kwh = (amount / 350).toFixed(2); 
        unitsDisplay.innerText = kwh;
    } else {
        unitsBox.style.display = 'none';
    }
}
</script>
</body>
</html>
