<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00b894">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUKU Token Pay</title>
    <style>
    body {
    margin: 0;
    padding: 0;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), 
                url('https://images.unsplash.com/photo-1473341304170-971dccb5ac1e');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    height: 100vh;
    font-family: 'Segoe UI', Roboto, sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Invisible containers for the borderless look */
.account-card, .glass-card {
    background: none !important; 
    border: none !important;
    box-shadow: none !important;
    backdrop-filter: none !important;
    width: 90%;
    max-width: 400px;
    padding: 20px;
    text-align: center;
}

/* Ensure text is readable against the background */
h1, h3, p, label, .header-greeting {
    text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.9);
    color: white !important;
}

.unit-balance {
    font-size: 3rem;
    color: #00d2ff; 
    font-weight: bold;
    text-shadow: 0px 0px 15px rgba(0, 210, 255, 0.5);
}

/* Floating inputs */
input {
    width: 100%;
    background: rgba(255, 255, 255, 0.15) !important;
    border: 1px solid rgba(255, 255, 255, 0.4) !important;
    backdrop-filter: blur(8px);
    border-radius: 10px;
    padding: 12px;
    color: white !important;
    margin-top: 10px;
}

input::placeholder {
    color: rgba(255, 255, 255, 0.7);
}

/* The action button */
.glass-button, .pay-btn {
    background: #e60000;
    color: white;
    border: none;
    padding: 15px;
    width: 100%;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 30px;
    transition: 0.3s;
    box-shadow: 0px 4px 10px rgba(230, 0, 0, 0.4);
}

.glass-button:hover, .pay-btn:hover {
    background: #ff3333;
    transform: scale(1.02);
}
    </style>
</head>
<body>
    <div class="header-greeting" style="margin-top: 40px; font-size: 1.2rem;">
    Habari, Muslimu 👋
</div>

<div class="glass-card">
    <h3 style="opacity: 0.8; letter-spacing: 1px;">LUKU BALANCE</h3>
    <div class="unit-balance">14.20 <span style="font-size: 1.2rem;">kWh</span></div>
    <p style="font-size: 0.9rem; opacity: 0.7;">● Meter Active: 1420...</p>

    <div style="margin-top: 40px;">
        <label style="display: block; text-align: left; font-size: 0.8rem;">METER NUMBER</label>
        <input type="number" placeholder="1420 5678 112">
    </div>

    <div style="margin-top: 20px;">
        <label style="display: block; text-align: left; font-size: 0.8rem;">AMOUNT (TSH)</label>
        <input type="number" placeholder="Min 1,000">
    </div>

    <button class="glass-button" style="margin-top: 30px;">Nunua Kifurushi</button>
</div>
    <div style="position:fixed; bottom:0; width:100%; height:70px; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); display:flex; justify-content: space-around; align-items:center; border-top: 1px solid rgba(255, 255, 255, 0.1);">
    
    <div style="color: #00d2ff; text-align:center; font-size:11px;">
        🏠<br>Home
    </div>
    
    <div style="color: rgba(255, 255, 255, 0.6); text-align:center; font-size:11px;">
        📊<br>Usage
    </div>
    
    <div style="color: rgba(255, 255, 255, 0.6); text-align:center; font-size:11px;">
        👤<br>Account
    </div>
    
</div>
<script>
    // 1. The Dictionary
    const translations = {
        en: {
            greeting: "Hello, name 👋",
            balance_label: "LUKU BALANCE",
            meter_label: "METER NUMBER",
            amount_label: "AMOUNT (TSH)",
            pay_btn: "Buy Units",
            active_meter: "● Meter Active: ",
            home: "Home",
            usage: "Usage",
            account: "Account"
        },
        sw: {
            greeting: "Habari, Muslimu 👋",
            balance_label: "SALIO LA LUKU",
            meter_label: "NAMBA YA MITA",
            amount_label: "KIASI (TSH)",
            pay_btn: "Nunua Kifurushi",
            active_meter: "● Mita Ipo Hewani: ",
            home: "Nyumbani",
            usage: "Matumizi",
            account: "Akaunti"
        }
    };

    let currentLang = 'sw';

    // 2. The Switcher Function
    function toggleLanguage() {
        currentLang = (currentLang === 'sw') ? 'en' : 'sw';
        
        // Update the toggle button text
        document.getElementById('lang-label').innerText = (currentLang === 'sw') ? 'EN' : 'SW';

        // Update all text elements
        document.getElementById('text-greeting').innerText = translations[currentLang].greeting;
        document.getElementById('balance-title').innerText = translations[currentLang].balance_label;
        document.getElementById('meter-label').innerText = translations[currentLang].meter_label;
        document.getElementById('amount-label').innerText = translations[currentLang].amount_label;
        document.getElementById('pay-btn-text').innerText = translations[currentLang].pay_btn;
        
        // Update Bottom Nav
        const navItems = document.querySelectorAll('.nav-text');
        navItems[0].innerText = translations[currentLang].home;
        navItems[1].innerText = translations[currentLang].usage;
        navItems[2].innerText = translations[currentLang].account;
    }
async function pay() {
    // Get the values the user typed in
    const meterId = document.getElementById('meter').value;
    const amount = document.getElementById('amount').value;

    // Basic check to make sure fields aren't empty
    if (!meterId || !amount) {
        alert("Tafadhali jaza mita na kiasi!");
        return;
    }

    try {
        // Send the data to your Python backend (flow.py)
        const response = await fetch('/pay', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ meter_id: meterId, amount: amount })
        });
        
        const data = await response.json();
        
        if (data.status === "success") {
            alert("Token imetumwa: " + data.token);
        }
    } catch (error) {
        console.error("Error:", error);
        alert("Imeshindwa kutuma! Hakikisha Python (flow.py) inakimbia.");
    }
}
function calculateUnits() {
    const amount = document.getElementById('amount').value;
    const unitsBox = document.getElementById('units-box');
    const unitsDisplay = document.getElementById('predicted-units');
    
    if (amount >= 1000) {
        unitsBox.style.display = 'block';
        // Logic: Tanzanian residential rate is ~350 TSH per unit
        const kwh = (amount / 350).toFixed(2); 
        unitsDisplay.innerText = kwh;
    } else {
        unitsBox.style.display = 'none';
    }
}
</script>
</body>
</html>
