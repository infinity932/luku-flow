<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="theme-color" content="#00b894">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUKU Token Pay</title>
    <style>
/* 1. Global Reset & Consistent Background (Same on both) */
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), 
                url('https://images.unsplash.com/photo-1473341304170-971dccb5ac1e');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    font-family: 'Segoe UI', Roboto, sans-serif;
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center; /* This centers everything on both devices */
    align-items: center;
}

/* 2. PC Styling (Default) */
/* The "Invisible Box" keeps your PC version looking exactly like your screenshot */
.glass-card, .auth-container {
    background: none; 
    border: none;
    width: 90%;
    max-width: 400px;
    padding: 20px;
    text-align: center;
    /* On PC, keep items compact (current look) */
    display: flex;
    flex-direction: column;
    gap: 15px; 
}

/* 3. The "Text Shadow Safety Net" (Same on both) */
h1, h2, h3, p, label, .toggle-link {
    text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.9);
    color: white !important;
}

/* Balance style from your screenshot */
.unit-balance {
    font-size: 3rem;
    color: #00d2ff; 
    font-weight: bold;
    text-shadow: 0px 0px 15px rgba(0, 210, 255, 0.5);
}

/* Unified Floating Input Style (Same on both) */
input {
    width: 100%;
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(8px);
    border-radius: 10px;
    padding: 14px; /* Increased padding slightly for mobile thumbs */
    color: white;
    box-sizing: border-box; /* Crucial for phone width */
}

input::placeholder {
    color: rgba(255, 255, 255, 0.7);
}

/* Nunua Button Style from your screenshot */
.glass-button, .pay-btn {
    background: #e60000;
    color: white;
    border: none;
    padding: 18px; /* Bigger button for mobile */
    width: 100%;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0px 4px 15px rgba(230, 0, 0, 0.4);
}

/* ----------------------------------------------------------- */
/* THE MOBILE MAGIC (Media Query)                              */
/* If the screen is narrower than 768px (most phones), use this: */
/* ----------------------------------------------------------- */
@media (max-width: 768px) {
    
    body {
        justify-content: flex-start; /* Move content to the very top of the screen */
        align-items: center;
        padding-top: 30px; /* Give a little breathing room at the very top */
    }

    .glass-card, .auth-container {
        /* Instead of being centred in a small area, it now stretches
           from the top greeting all the way down toward the button */
        height: auto;
        min-height: calc(100vh - 100px); /* Fill most of the vertical space */
        justify-content: flex-start;
        display: flex;
        flex-direction: column;
        
        /* Increase distance between sections (Greeting -> Balance -> Inputs) */
        gap: 35px; 
    }
    
    /* Place the Greeting at the very top */
    .header-greeting {
        margin-top: 0;
        font-size: 1.1rem;
    }
    
    /* Make the Balance area central and dominant */
    .unit-balance {
        font-size: 4rem; /* Larger numbers on tall screens */
        margin-top: 20px;
    }
    
    /* Spacing between the label and input on phone */
    .input-group label {
        display: block;
        margin-bottom: 10px;
        font-size: 0.85rem;
    }
    
    /* The core request: Push the button DOWN */
    .glass-button, .pay-btn {
        margin-top: auto; /* This automatically takes up available vertical space
                             pushing the button all the way to the bottom
                             (but above the navigation bar) */
        margin-bottom: 50px; /* Keeps it clear of the bottom navigation bar */
    }
}
/* Add this to your styles */
.warning-pulse {
    background: rgba(255, 0, 0, 0.3) !important;
    border: 2px solid #ff4b2b !important;
    animation: pulse-red 2s infinite;
}

@keyframes pulse-red {
    0% { box-shadow: 0 0 0 0 rgba(255, 75, 43, 0.7); }
    70% { box-shadow: 0 0 0 15px rgba(255, 75, 43, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 75, 43, 0); }
}
/* Responsive Layout */
body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                url('your-background.jpg') no-repeat center center fixed;
    background-size: cover;
    font-family: 'Segoe UI', sans-serif;
}
.dashboard-container {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
}

.welcome-text {
    color: white;
    font-size: 2rem;
    margin-bottom: 25px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
}

.glass-card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
}

/* Ensure inputs take full width of the card */
input {
    width: 100%;
    box-sizing: border-box;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(0,0,0,0.2);
    color: white;
}
body {
    background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                url('https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?q=80&w=2070&auto=format&fit=crop');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    margin: 0;
    padding: 0;
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}
min-height: 100vh;
}

.dashboard-container {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
}
</style>
</head>
<body>
    <div class="dashboard-container">
        <h2 id="user-greeting" class="welcome-text" style="margin-top: 40px; text-align: center; width: 100%;">
    Habari, Mteja 👋
</h2>

        <div class="glass-card">
            <h3 style="opacity: 0.8; letter-spacing: 1px;">LUKU BALANCE</h3>
            <div class="unit-balance">
                0.00 <span style="font-size: 1.2rem;">kWh</span>
            </div>
            <p style="font-size: 0.9rem; opacity: 0.7;">● Meter Active: 1420...</p>

            <div class="input-group">
                <label>METER NUMBER</label>
                <input type="number" placeholder="1420 5678 112" value="14205678112">
            </div>

            <div class="input-group">
                <label>AMOUNT (TSH)</label>
                <input type="number" placeholder="Min 1,000">
            </div>

            <button class="glass-button" onclick="processPurchase()">Nunua Kifurushi</button>
        </div>
    </div>
    <div style="position:fixed; bottom:0; width:100%; height:70px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1);">
    
    <div class="nav-item" onclick="window.location.href='index.html'" style="text-align:center; color: #00d2ff; cursor: pointer;">
        <i class="fas fa-home" style="font-size: 20px;"></i><br>
        <span style="font-size: 11px;">Home</span>
    </div>

    <div class="nav-item" onclick="window.location.href='history.html'" style="text-align:center; color: rgba(255,255,255,0.6); cursor: pointer;">
        <i class="fas fa-bolt" style="font-size: 20px;"></i><br>
        <span style="font-size: 11px;">Usage</span>
    </div>

    <div class="nav-item" onclick="window.location.href='account.html'">
    <i class="fas fa-user"></i><br>
    <span>Account</span>
</div>

</div>
    
</div>
<script>
    // 1. The Dictionary
    const translations = {
        en: {
            greeting: "Hello, name 👋",
            balance_label: "LUKU BALANCE",
            meter_label: "METER NUMBER",
            amount_label: "AMOUNT (TSH)",
            pay_btn: "Buy Units",
            active_meter: "● Meter Active: ",
            home: "Home",
            usage: "Usage",
            account: "Account"
        },
        sw: {
            greeting: "Habari, Muslimu 👋",
            balance_label: "SALIO LA LUKU",
            meter_label: "NAMBA YA MITA",
            amount_label: "KIASI (TSH)",
            pay_btn: "Nunua Kifurushi",
            active_meter: "● Mita Ipo Hewani: ",
            home: "Nyumbani",
            usage: "Matumizi",
            account: "Akaunti"
        }
    };

    let currentLang = 'sw';

    // 2. The Switcher Function
    function toggleLanguage() {
        currentLang = (currentLang === 'sw') ? 'en' : 'sw';
        
        // Update the toggle button text
        document.getElementById('lang-label').innerText = (currentLang === 'sw') ? 'EN' : 'SW';

        // Update all text elements
        document.getElementById('text-greeting').innerText = translations[currentLang].greeting;
        document.getElementById('balance-title').innerText = translations[currentLang].balance_label;
        document.getElementById('meter-label').innerText = translations[currentLang].meter_label;
        document.getElementById('amount-label').innerText = translations[currentLang].amount_label;
        document.getElementById('pay-btn-text').innerText = translations[currentLang].pay_btn;
        
        // Update Bottom Nav
        const navItems = document.querySelectorAll('.nav-text');
        navItems[0].innerText = translations[currentLang].home;
        navItems[1].innerText = translations[currentLang].usage;
        navItems[2].innerText = translations[currentLang].account;
    }
async function pay() {
    // Get the values the user typed in
    const meterId = document.getElementById('meter').value;
    const amount = document.getElementById('amount').value;

    // Basic check to make sure fields aren't empty
    if (!meterId || !amount) {
        alert("Tafadhali jaza mita na kiasi!");
        return;
    }

    try {
        // Send the data to your Python backend (flow.py)
        const response = await fetch('/pay', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ meter_id: meterId, amount: amount })
        });
        
        const data = await response.json();
        
        if (data.status === "success") {
            alert("Token imetumwa: " + data.token);
        }
    } catch (error) {
        console.error("Error:", error);
        alert("Imeshindwa kutuma! Hakikisha Python (flow.py) inakimbia.");
    }
}
function calculateUnits() {
    const amount = document.getElementById('amount').value;
    const unitsBox = document.getElementById('units-box');
    const unitsDisplay = document.getElementById('predicted-units');
    
    if (amount >= 1000) {
        unitsBox.style.display = 'block';
        // Logic: Tanzanian residential rate is ~350 TSH per unit
        const kwh = (amount / 350).toFixed(2); 
        unitsDisplay.innerText = kwh;
    } else {
        unitsBox.style.display = 'none';
    }
}
// This function runs automatically when the Dashboard opens
window.onload = async function() {
    try {
        const response = await fetch('/api/user_data');
        
        if (!response.ok) {
            throw new Error('Could not fetch user data');
        }

        const data = await response.ok ? await response.json() : null;

        if (data && data.username) {
            // Find the greeting span and update "Muslimu" to the real name
            document.getElementById('user-greeting').innerText = `Habari, ${data.username} 👋`;
        }
    } catch (error) {
        console.error('Error loading dashboard:', error);
    }
};
async function updateDashboard() {
    try {
        const response = await fetch('/api/user_data');
        const data = await response.json();
        document.getElementById('user-greeting').innerText = `Habari, ${data.name || 'Mteja'} 👋`;
        const balanceElement = document.querySelector('.unit-balance');
        const balanceCard = balanceElement.closest('.glass-card'); // Finds the card container

        // Update the number
        balanceElement.innerHTML = `${data.balance} <span style="font-size: 1.2rem;">kWh</span>`;

        // Check for Low Balance (Less than 2.0 kWh)
        if (data.balance < 2.0) {
            balanceCard.classList.add('warning-pulse');
            // Change "Meter Active" text to a warning
            document.querySelector('.glass-card p').innerHTML = 
                '<i class="fas fa-exclamation-triangle"></i> SALIO NI KIDOGO! NUNUA SASA';
            document.querySelector('.glass-card p').style.color = "#ff4b2b";
        } else {
            balanceCard.classList.remove('warning-pulse');
            document.querySelector('.glass-card p').innerHTML = "● Meter Active: 1420...";
            document.querySelector('.glass-card p').style.color = "rgba(255,255,255,0.7)";
        }
    } catch (e) {
        console.log("Error updating dashboard");
    }
}

// Check every 30 seconds automatically
setInterval(updateDashboard, 30000);
window.onload = updateDashboard;
</script>
<script>
async function processPurchase() {
    // Get the amount from your input box
    const amountInput = document.querySelector('input[placeholder="Min 1,000"]').value;

    try {
        const response = await fetch('/api/buy_units', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                amount: amountInput // This MUST match float(data.get("amount")) in flow.py
            })
        });

        const result = await response.json();

        if (result.status === "success") {
            alert(`Malipo yamekamilika! Umeongezewa ${result.added} kWh.`);
            updateDashboard();
            if (result.status === "success") {
    // 1. Show the success message
    alert(`Malipo yamekamilika! Umeongezewa ${result.added} kWh.`);
    
    // 2. Update the dashboard balance
    updateDashboard(); 

    // 3. Update the greeting name (Inside the function brackets)
    document.querySelector('.welcome-text').innerText = `Habari, ${result.name || 'Mteja'} 👋`;

    // 4. Clear the amount input box so it is empty for the next time
    document.querySelector('input[placeholder="Min 1,000"]').value = ""; 
} // Refreshes the 0 kWh to the new balance
        } else {
            // This shows "User not logged in" if phone isn't in users_db
            alert("Error: " + result.message);
        }
    } catch (error) {
        alert("Imeshindwa kuunganisha na server.");
    }
}
</script>
</body>
