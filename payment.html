<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>LUKU Connect - Malipo</title>
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1473341304170-971dccb5ac1e');
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .pay-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px; width: 380px; text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .method-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .method-item {
            background: rgba(255,255,255,0.2); padding: 15px; border-radius: 10px;
            cursor: pointer; border: 2px solid transparent; transition: 0.3s;
        }
        .method-item:hover { border-color: #ffcc00; background: rgba(255,255,255,0.3); }
        .method-item img { height: 40px; display: block; margin: 0 auto 5px; }
        input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: none; box-sizing: border-box; }
        .pay-btn { width: 100%; padding: 15px; background: #00cc66; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="pay-card">
    <h2>Kamilisha Malipo</h2>
    <p>Meter: <span id="displayMeter">---</span></p>
    <p>Kiasi: <strong>TZS <span id="displayAmount">0</span></strong></p>

    <div class="method-grid">
    <div class="method-item" onclick="selectMethod('mpesa')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/M-Pesa_Logo.svg/512px-M-Pesa_Logo.svg.png" alt="M-Pesa">
        <span>M-Pesa</span>
    </div>
    <div class="method-item" onclick="selectMethod('tigo')">
        <img src="https://logos-world.net/wp-content/uploads/2021/02/Tigo-Logo.png" alt="Tigo">
        <span>TigoPesa</span>
    </div>
    <div class="method-item" onclick="selectMethod('airtel')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Airtel_logo.svg/512px-Airtel_logo.svg.png" alt="Airtel">
        <span>Airtel</span>
    </div>
    <div class="method-item" onclick="selectMethod('halo')">
        <img src="https://halotel.co.tz/static/media/halopesa_logo.3e59714e.png" alt="Halopesa">
        <span>HaloPesa</span>
    </div>
    <div class="method-item" onclick="selectMethod('card')" style="grid-column: span 2;">
        <div style="font-size: 20px;">💳 Visa / Mastercard</div>
    </div>
</div>

    <input type="number" id="phoneNum" placeholder="Namba ya Simu (e.g. 07XXXXXXXX)">
    <button class="pay-btn" onclick="startPayment()">LIPA SASA</button>
</div>
<div class="glass-card" style="margin-top: 20px; padding: 20px;">
    <h3>Nunua Umeme</h3>
    <label style="font-size: 0.8rem; opacity: 0.8; display: block; margin-bottom: 5px;">KIASI (TSH)</label>
    <input type="number" id="pay-amount" placeholder="Weka kiasi..." style="margin-bottom: 20px; width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white;">
    
    <button class="glass-button" id="pay-btn" style="background: #2ecc71; width: 100%; border: none; padding: 15px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer;">LIPA SASA</button>

    <div id="token-display" style="display:none; margin-top: 20px; padding: 15px; background: rgba(46, 204, 113, 0.1); border: 2px dashed #2ecc71; border-radius: 10px; text-align: center;">
        <p style="margin: 0; font-size: 0.8rem; color: #ccc;">TOKEN YAKO:</p>
        <h2 id="generated-token" style="letter-spacing: 2px; color: #fff; margin: 10px 0;"></h2>
        <small style="color: #2ecc71;">Ingiza namba hizi kwenye mita yako</small>
    </div>
</div>

<script>
document.getElementById('pay-btn').addEventListener('click', async function() {
    const amount = document.getElementById('pay-amount').value;
    
    // 1. Check if the amount is enough
    if(amount < 1000) {
        alert("Kiasi cha chini ni TSH 1,000");
        return;
    }

    // 2. Tell flow.py to add units to our balance
    try {
        const response = await fetch('/api/buy_units', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ amount: amount })
        });
        
        const result = await response.json();
        
        if(result.status === "success") {
            // 3. Generate the 20-digit LUKU token visually
            const generateSegment = () => Math.floor(1000 + Math.random() * 9000);
            const fullToken = `${generateSegment()} ${generateSegment()} ${generateSegment()} ${generateSegment()} ${generateSegment()}`;
            
            // 4. Show the success screen
            document.getElementById('generated-token').innerText = fullToken;
            document.getElementById('token-display').style.display = 'block';
            
            this.innerText = "MALIPO YAMEKAMILIKA";
            this.style.background = "#95a5a6";
            this.disabled = true;

            alert(`Hongera! Umenunua ${result.added} kWh. Salio jipya: ${result.new_balance} kWh`);
        } else {
            alert("Hitilafu: " + result.message);
        }
    } catch (error) {
        console.error("Error:", error);
        alert("Server haipatikani. Hakikisha flow.py inafanya kazi!");
    }
});
</script>

</body>
</html>
