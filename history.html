<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>LUKU Connect - Historia</title>
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1473341304170-971dccb5ac1e');
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            color: white; margin: 0; padding: 20px;
        }
        .container { 
    max-width: 800px; 
    margin: auto; 
    padding-bottom: 80px; /* This prevents the bottom nav from hiding your cards */
}
        h2 { border-bottom: 2px solid #ffcc00; padding-bottom: 10px; }
        
        table {
            width: 100%; border-collapse: collapse; margin-top: 20px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border-radius: 10px; overflow: hidden;
        }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(255, 255, 255, 0.1); color: #ffcc00; }
        
        .token-cell { font-family: 'Courier New', monospace; color: #00ff88; font-weight: bold; }
        .back-btn { margin-bottom: 20px; cursor: pointer; color: #ffcc00; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div class="back-btn" onclick="window.location.href='index.html'">← Rudi Dashboard</div>
    <h2>Historia ya Ununuzi (Purchase History)</h2>

    <table>
        <thead>
            <tr>
                <th>Tarehe</th>
                <th>Mita (Nickname)</th>
                <th>Kiasi (TZS)</th>
                <th>Token Number</th>
            </tr>
        </thead>
        <tbody id="historyTable"></tbody>
    </table>
</div>
<div class="glass-card" style="margin-top: 20px; padding: 20px;">
    <h3>Matumizi ya Umeme</h3>
    <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #444;">
        <span>Leo</span>
        <span style="color: #00d2ff;">4.5 kWh</span>
    </div>
    <div style="display: flex; justify-content: space-between; padding: 10px 0;">
        <span>Jana</span>
        <span style="color: #00d2ff;">5.2 kWh</span>
    </div>
</div>
<div style="position:fixed; bottom:0; left:0; width:100%; height:70px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000;">
        <div class="nav-item" onclick="window.location.href='index.html'" style="text-align:center; cursor:pointer;">
            <i class="fas fa-home" style="font-size: 20px;"></i><br>
            <span style="font-size: 11px;">Home</span>
        </div>
        <div class="nav-item" onclick="window.location.href='history.html'" style="text-align:center; cursor:pointer; color: #00d2ff;">
            <i class="fas fa-bolt" style="font-size: 20px;"></i><br>
            <span style="font-size: 11px;">Usage</span>
        </div>
        <div class="nav-item" onclick="window.location.href='account.html'" style="text-align:center; cursor:pointer;">
            <i class="fas fa-user" style="font-size: 20px;"></i><br>
            <span style="font-size: 11px;">Account</span>
        </div>
    </div>
</body>
<script>
async function loadHistory() {
    try {
        const response = await fetch('/api/get_history');
        const data = await response.json();
        const tableBody = document.getElementById('historyTable');
        
        tableBody.innerHTML = ''; // Clears old data

        data.purchases.forEach(item => {
            const row = `
                <tr>
                    <td>${item.date}</td>
                    <td>${item.meter_nickname}</td>
                    <td>${item.amount}</td>
                    <td class="token-cell" style="color: #00ff88; font-family: monospace;">${item.token}</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    } catch (e) {
        console.log("Error loading history:", e);
    }
}

// Start loading when the page opens
window.onload = loadHistory;
</script>
</html>
